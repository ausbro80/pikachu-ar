<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚡ Pikachu AR</title>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --pkmn-yellow: #FFCB05; --pkmn-red: #EE1515; --ink: #222224; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Trebuchet MS', sans-serif; color: #fff; }

  #start-screen {
    position: fixed; inset: 0; z-index: 100;
    background: radial-gradient(circle at center, rgba(255,203,5,0.2), #0a0a18 70%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    transition: opacity 0.6s ease;
  }
  #start-screen.hidden { opacity: 0; pointer-events: none; }

  .pokeball {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(180deg, #fff 0%, #fff 49%, var(--ink) 49%, var(--ink) 51%, var(--pkmn-red) 51%, var(--pkmn-red) 100%);
    border: 4px solid var(--ink);
    margin-bottom: 24px; position: relative;
    box-shadow: 0 12px 40px rgba(238,21,21,0.4);
    animation: bob 3s ease-in-out infinite;
  }
  .pokeball::after {
    content: ''; position: absolute; top: 50%; left: 50%;
    width: 26px; height: 26px; background: #fff; border: 4px solid var(--ink);
    border-radius: 50%; transform: translate(-50%, -50%);
    box-shadow: inset 0 0 0 3px #fff;
  }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

  h1 {
    font-size: clamp(32px, 8vw, 52px); font-weight: 900; letter-spacing: 2px;
    color: var(--pkmn-yellow);
    text-shadow: 0 4px 20px rgba(255,203,5,0.4);
    margin-bottom: 8px; text-transform: uppercase;
  }
  .subtitle {
    font-size: 12px; letter-spacing: 4px; color: rgba(255,203,5,0.7);
    text-transform: uppercase; margin-bottom: 32px;
  }

  .start-btn {
    background: linear-gradient(180deg, var(--pkmn-yellow), #d9a704);
    color: var(--ink); border: 3px solid var(--ink);
    padding: 16px 44px; font-size: 17px; font-weight: 900;
    letter-spacing: 3px; text-transform: uppercase;
    border-radius: 999px; cursor: pointer;
    box-shadow: 0 8px 24px rgba(255,203,5,0.4);
  }
  .start-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #ar-container { position: fixed; inset: 0; }

  #ar-ui {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 16px; display: none; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  #ar-ui.active { display: flex; }
  .badge {
    background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
    border: 2px solid var(--pkmn-yellow);
    padding: 8px 14px; border-radius: 999px;
    font-size: 11px; font-weight: 900; letter-spacing: 2px;
    color: var(--pkmn-yellow); pointer-events: auto;
  }
  .badge::before { content: '⚡'; margin-right: 6px; animation: blink 1.2s infinite; }
  @keyframes blink { 50% { opacity: 0.4; } }

  .stop-btn {
    background: var(--pkmn-red); color: #fff; border: 2px solid #fff;
    padding: 8px 16px; border-radius: 999px;
    font-size: 11px; font-weight: 900; letter-spacing: 2px;
    cursor: pointer; pointer-events: auto;
  }

  #scan-hint {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    z-index: 50; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
    padding: 12px 20px; border: 2px solid var(--pkmn-yellow);
    border-radius: 999px; font-size: 13px; font-weight: 700;
    color: var(--pkmn-yellow); display: none; white-space: nowrap;
  }
  #scan-hint.active { display: block; animation: blink 1.5s infinite; }

  #attack-btn {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 50; background: linear-gradient(180deg, var(--pkmn-yellow), #d9a704);
    color: var(--ink); border: 3px solid var(--ink);
    padding: 16px 36px; border-radius: 999px;
    font-size: 16px; font-weight: 900; letter-spacing: 2px;
    cursor: pointer; display: none;
    box-shadow: 0 8px 24px rgba(255,203,5,0.5);
  }
  #attack-btn.active { display: block; }
  #attack-btn:active { transform: translateX(-50%) translateY(2px); }

  /* 디버그 패널 (모바일에서 콘솔 못 보니까 화면에 표시) */
  #debug-log {
    position: fixed; top: 60px; left: 8px; right: 8px;
    z-index: 49; max-height: 180px; overflow-y: auto;
    background: rgba(0,0,0,0.85); border: 1px solid var(--pkmn-yellow);
    border-radius: 8px; padding: 8px 10px;
    font-family: monospace; font-size: 10px; line-height: 1.4;
    color: #aaffaa; display: none;
    pointer-events: none;
  }
  #debug-log.active { display: block; }
  #debug-log .err { color: #ff6666; }
  #debug-log .warn { color: #ffaa00; }

  #status-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.9);
    display: none; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  #status-overlay.active { display: flex; }
  .status-card {
    background: rgba(255,255,255,0.05); border: 2px solid var(--pkmn-yellow);
    border-radius: 16px; padding: 24px; max-width: 360px;
  }
  .status-card h3 { color: var(--pkmn-yellow); margin-bottom: 12px; }
  .status-card p { font-size: 13px; line-height: 1.5; }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,203,5,0.2);
    border-top-color: var(--pkmn-yellow);
    border-radius: 50%; margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="start-screen">
  <div class="pokeball"></div>
  <h1>PIKACHU AR</h1>
  <div class="subtitle">⚡ Mixamo Punch ⚡</div>
  <button class="start-btn" id="start-btn" disabled>LOADING...</button>
</div>

<div id="ar-container"></div>

<div id="ar-ui">
  <div class="badge">PIKACHU LIVE</div>
  <button class="stop-btn" id="stop-btn">EXIT</button>
</div>

<div id="debug-log"></div>

<div id="scan-hint">📷 카드를 비춰주세요</div>

<button id="attack-btn">⚡ THUNDER PUNCH ⚡</button>

<div id="status-overlay" class="active">
  <div class="status-card" id="status-content">
    <div class="spinner"></div>
    <h3>LOADING</h3>
    <p>잠시만요...</p>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

// ===== 디버그 로그 (화면에 표시) =====
const debugLog = document.getElementById('debug-log');
const logs = [];
function log(msg, type = 'info') {
  console.log(msg);
  logs.push({ msg, type, time: new Date().toLocaleTimeString() });
  if (logs.length > 15) logs.shift();
  debugLog.classList.add('active');
  debugLog.innerHTML = logs.map(l =>
    `<div class="${l.type === 'err' ? 'err' : l.type === 'warn' ? 'warn' : ''}">${l.time.split(' ')[0]} ${l.msg}</div>`
  ).join('');
  debugLog.scrollTop = debugLog.scrollHeight;
}

const startScreen = document.getElementById('start-screen');
const startBtn = document.getElementById('start-btn');
const stopBtn = document.getElementById('stop-btn');
const attackBtn = document.getElementById('attack-btn');
const arUI = document.getElementById('ar-ui');
const scanHint = document.getElementById('scan-hint');
const statusOv = document.getElementById('status-overlay');
const statusContent = document.getElementById('status-content');

let mindarThree = null;
let mixer = null;
let punchAction = null;
let pikachuRoot = null; // anchor에 추가될 모델 그룹
const sparks = []; // 살아있는 지지직 번개들

function showStatus(html) { statusContent.innerHTML = html; statusOv.classList.add('active'); }
function showError(t, m) {
  statusContent.innerHTML = `<h3 style="color:#ff6677">⚠ ${t}</h3><p>${m}</p><button onclick="location.reload()" style="margin-top:16px;background:#FFCB05;color:#222;border:none;padding:8px 24px;border-radius:999px;font-weight:900;cursor:pointer">RETRY</button>`;
  statusOv.classList.add('active');
}
function hideStatus() { statusOv.classList.remove('active'); }

if (typeof MindARThree !== 'function') {
  showError('LIBRARY LOAD FAILED', 'MindAR 로드 실패');
} else {
  hideStatus();
  startBtn.disabled = false;
  startBtn.textContent = '⚡ START ⚡';
}

// =========================================
// ⚡ 전기 구체 (피카츄 주변 약한 글로우)
// =========================================
function createElectricAura() {
  const group = new THREE.Group();

  // 노란 글로우 구체 (안 채워진, 가장자리만 빛나는)
  const aura = new THREE.Mesh(
    new THREE.SphereGeometry(0.5, 32, 32),
    new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uIntensity: { value: 0.3 },
      },
      vertexShader: `
        varying vec3 vNormal;
        varying vec3 vWorldPos;
        void main() {
          vNormal = normalize(normalMatrix * normal);
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform float uIntensity;
        varying vec3 vNormal;
        varying vec3 vWorldPos;

        float hash(vec3 p) {
          p = fract(p * vec3(443.8975, 397.2973, 491.1871));
          p += dot(p, p.yxz + 19.19);
          return fract((p.x + p.y) * p.z);
        }

        void main() {
          vec3 viewDir = normalize(cameraPosition - vWorldPos);
          float fresnel = 1.0 - abs(dot(vNormal, viewDir));
          fresnel = pow(fresnel, 2.5);

          // 노이즈 스파크
          float noise = hash(vWorldPos * 6.0 + uTime * 4.0);
          float spark = step(0.95, noise);

          vec3 color = vec3(1.0, 0.9, 0.3);
          float alpha = (fresnel * 0.4 + spark * 0.5) * uIntensity;
          gl_FragColor = vec4(color, alpha);
        }
      `,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      side: THREE.DoubleSide,
    })
  );
  group.add(aura);
  group.userData.aura = aura;
  return group;
}

// =========================================
// ⚡ 얇은 지지직 번개 (sparks)
// 굵은 광선 X, 얇은 line으로 짧게 깜빡깜빡
// =========================================
function createSpark(start, end) {
  const points = [];
  const segments = 10;
  for (let i = 0; i <= segments; i++) {
    const t = i / segments;
    const p = new THREE.Vector3().lerpVectors(start, end, t);
    if (i > 0 && i < segments) {
      const offset = 0.06 * (1 - Math.abs(t - 0.5) * 2);
      p.x += (Math.random() - 0.5) * offset;
      p.y += (Math.random() - 0.5) * offset;
      p.z += (Math.random() - 0.5) * offset;
    }
    points.push(p);
  }
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({
    color: 0xffee00,
    transparent: true,
    opacity: 1.0,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  const line = new THREE.Line(geo, mat);
  line.userData.life = 1.0;
  line.userData.maxLife = 0.15 + Math.random() * 0.1; // 짧게 (0.15~0.25초)
  return line;
}

// =========================================
// 🎯 AR START
// =========================================
async function startAR() {
  try {
    showStatus(`<div class="spinner"></div><h3>CAMERA INIT</h3>`);

    mindarThree = new MindARThree({
      container: document.querySelector('#ar-container'),
      imageTargetSrc: './assets/pikachu_card.mind',
      uiScanning: 'no',
      uiLoading: 'no',
      uiError: 'no',
    });

    const { renderer, scene, camera } = mindarThree;
    renderer.setClearColor(0x000000, 0);

    // 조명 (디테일 살리는 적정 수준)
    scene.add(new THREE.AmbientLight(0xffffff, 1.0));
    const hemi = new THREE.HemisphereLight(0xffffff, 0xfff5d6, 0.6);
    scene.add(hemi);
    const front = new THREE.DirectionalLight(0xffffff, 1.2);
    front.position.set(0, 0, 5);
    scene.add(front);
    const key = new THREE.DirectionalLight(0xffffff, 0.8);
    key.position.set(2, 4, 3);
    scene.add(key);

    const anchor = mindarThree.addAnchor(0);

    // GLB 로드
    showStatus(`<div class="spinner"></div><h3>LOADING MODEL</h3>`);
    log('GLB 로딩 시작');

    const loader = new GLTFLoader();
    const gltf = await new Promise((resolve, reject) => {
      loader.load('./assets/pikachu.glb', resolve, undefined, reject);
    });

    log(`GLB 로드 완료, animations=${gltf.animations.length}`);

    const pikachu = gltf.scene;

    // 머티리얼 보정 + 홀로그램 등장 효과 추가
    const holoUniforms = []; // 모든 머티리얼의 uniform 추적
    pikachu.traverse((child) => {
      if (child.isMesh && child.material) {
        child.material.side = THREE.DoubleSide;
        child.material.transparent = true; // 등장 효과 위해
        if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) {
          child.material.metalness = Math.min(child.material.metalness || 0, 0.1);
          child.material.envMapIntensity = 1.0;
        }

        // 🌟 홀로그램 등장 효과 셰이더 주입
        // uReveal: 0=완전 홀로그램(파란색만), 1=완전 일반(원본 색)
        // uScanY: 스캔 라인 위치 (아래→위)
        const revealUniform = { value: 0.0 };
        const scanUniform = { value: 0.0 };
        holoUniforms.push({ reveal: revealUniform, scan: scanUniform });

        child.material.onBeforeCompile = (shader) => {
          shader.uniforms.uReveal = revealUniform;
          shader.uniforms.uScanY = scanUniform;

          // varying 추가 (vertex에서 fragment로 worldY 전달)
          shader.vertexShader = shader.vertexShader.replace(
            '#include <common>',
            `#include <common>
             varying float vWorldY;`
          );
          shader.vertexShader = shader.vertexShader.replace(
            '#include <begin_vertex>',
            `#include <begin_vertex>
             vec4 wp = modelMatrix * vec4(transformed, 1.0);
             vWorldY = wp.y;`
          );

          // fragment에서 색 합성
          shader.fragmentShader = shader.fragmentShader.replace(
            '#include <common>',
            `#include <common>
             uniform float uReveal;
             uniform float uScanY;
             varying float vWorldY;`
          );
          shader.fragmentShader = shader.fragmentShader.replace(
            '#include <dithering_fragment>',
            `#include <dithering_fragment>

             // 홀로그램 등장 효과
             // uScanY 아래는 일반 색, 위는 홀로그램 효과
             float scanDist = vWorldY - uScanY;

             // 스캔 라인에서 위쪽: 보이지도 않음 (아직 등장 전)
             if (scanDist > 0.05) {
               discard;
             }

             // 스캔 라인 근처: 밝은 노란 빛 (등장하는 순간)
             vec3 scanGlow = vec3(1.0, 1.0, 0.4);
             float scanIntensity = exp(-abs(scanDist) * 30.0);
             gl_FragColor.rgb = mix(gl_FragColor.rgb, scanGlow, scanIntensity * (1.0 - uReveal));

             // uReveal에 따라 홀로그램 → 일반 색 전환
             if (uReveal < 1.0) {
               // 홀로그램 모드: 파란/노란 톤 + 스캔라인
               vec3 holoColor = vec3(0.4, 0.9, 1.0); // 청록색
               float scanlines = sin(vWorldY * 80.0 - uScanY * 10.0) * 0.5 + 0.5;
               scanlines = pow(scanlines, 3.0);
               vec3 holoTint = mix(holoColor, gl_FragColor.rgb, uReveal);
               gl_FragColor.rgb = mix(holoTint + scanlines * 0.3, gl_FragColor.rgb, uReveal);
               gl_FragColor.a *= 0.6 + uReveal * 0.4;
             }
            `
          );
        };
        child.material.needsUpdate = true;
      }
    });

    // 사이즈 자동 조정
    const box = new THREE.Box3().setFromObject(pikachu);
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z);
    const scaleFactor = 0.7 / maxDim;
    pikachu.scale.setScalar(scaleFactor);
    log(`Scale: ${scaleFactor.toFixed(4)}`);

    // 발 위치 보정
    box.setFromObject(pikachu);
    pikachu.position.y -= box.min.y;

    // 모델 그룹 (카드 평면에 맞춰 회전)
    const modelGroup = new THREE.Group();
    modelGroup.add(pikachu);
    modelGroup.rotation.x = Math.PI / 2; // Y-up → 카드 위로 세움
    modelGroup.position.z = 0.0;

    // ===== 애니메이션 셋업 =====
    if (gltf.animations && gltf.animations.length > 0) {
      const clip = gltf.animations[0];
      log(`✅ Clip: "${clip.name}"`);
      log(`   duration=${clip.duration.toFixed(2)}s tracks=${clip.tracks.length}`);

      // 🔑 핵심: mixer를 gltf.scene 루트에 연결 (본 시스템 작동)
      mixer = new THREE.AnimationMixer(gltf.scene);

      punchAction = mixer.clipAction(clip);
      punchAction.setLoop(THREE.LoopOnce);
      punchAction.clampWhenFinished = false; // ❌ 끝 프레임 유지 안함
      punchAction.enabled = true;
      punchAction.weight = 1.0;
      punchAction.timeScale = 1.0;

      // 펀치 종료 이벤트 — 끝나면 자세 리셋
      mixer.addEventListener('finished', (e) => {
        if (e.action === punchAction) {
          log('  애니 종료 → 자세 리셋');
          punchAction.stop();
          punchAction.reset();
          punchAction.time = 0;
          punchAction.weight = 0; // 영향력 0 (T-pose도 아닌, GLB 원본 자세로)
          mixer.update(0); // 즉시 적용
        }
      });

      log('Mixer + action 준비 완료');
    } else {
      log('⚠️ GLB에 애니메이션 없음', 'warn');
    }

    anchor.group.add(modelGroup);
    pikachuRoot = modelGroup;

    // 전기 오라 추가 (피카츄 주변 약한 글로우)
    const electricAura = createElectricAura();
    electricAura.position.z = 0.4; // 피카츄 가슴 높이쯤
    anchor.group.add(electricAura);
    pikachuRoot.userData.aura = electricAura;

    // 모델 그룹의 bbox 계산 (스캔 라인 범위)
    box.setFromObject(pikachu);
    const modelMinY = box.min.y;
    const modelMaxY = box.max.y;
    log(`Model Y range: ${modelMinY.toFixed(2)} ~ ${modelMaxY.toFixed(2)}`);

    // ===== 이벤트 =====
    let revealStartTime = -1;

    anchor.onTargetFound = () => {
      log('🎯 카드 인식');
      scanHint.classList.remove('active');
      attackBtn.classList.add('active');
      // 홀로그램 등장 효과 시작 (아래에서 위로)
      revealStartTime = performance.now();
    };
    anchor.onTargetLost = () => {
      log('❌ 카드 사라짐');
      scanHint.classList.add('active');
      attackBtn.classList.remove('active');
      // 다시 홀로그램 상태로 리셋
      holoUniforms.forEach(u => {
        u.reveal.value = 0.0;
        u.scan.value = modelMinY - 0.1;
      });
      revealStartTime = -1;
    };

    // 초기 상태: 완전 가려진 상태 (스캔 시작 전)
    holoUniforms.forEach(u => {
      u.reveal.value = 0.0;
      u.scan.value = modelMinY - 0.1;
    });

    attackBtn.addEventListener('click', triggerPunch);

    await mindarThree.start();
    hideStatus();
    arUI.classList.add('active');
    scanHint.classList.add('active');

    // ===== ANIMATION LOOP =====
    const clock = new THREE.Clock();
    renderer.setAnimationLoop(() => {
      const dt = clock.getDelta();
      const t = clock.getElapsedTime();

      // 🔑 mixer.update 매 프레임 호출
      if (mixer) mixer.update(dt);

      // 🌟 홀로그램 등장 효과 진행
      if (revealStartTime > 0) {
        const elapsed = (performance.now() - revealStartTime) / 1000;
        const totalDuration = 2.0; // 2초 동안 등장

        if (elapsed < totalDuration) {
          // 1단계 (0~1.5초): 스캔 라인이 아래에서 위로 이동
          // 2단계 (1.5~2.0초): reveal 0→1 (홀로그램 → 원본 색)
          const scanProgress = Math.min(1, elapsed / 1.5);
          const scanY = modelMinY + (modelMaxY - modelMinY + 0.1) * scanProgress;

          let revealValue = 0;
          if (elapsed > 1.0) {
            revealValue = Math.min(1, (elapsed - 1.0) / 1.0);
          }

          holoUniforms.forEach(u => {
            u.scan.value = scanY;
            u.reveal.value = revealValue;
          });
        } else {
          // 등장 완료
          holoUniforms.forEach(u => {
            u.scan.value = modelMaxY + 1.0; // 매우 위로 (영향 없음)
            u.reveal.value = 1.0;
          });
        }
      }

      // 전기 오라 업데이트
      if (pikachuRoot && pikachuRoot.userData.aura) {
        const auraGroup = pikachuRoot.userData.aura;
        auraGroup.userData.aura.material.uniforms.uTime.value = t;
        const intensity = isAttacking ? 0.8 : 0.25 + Math.sin(t * 2.5) * 0.1;
        auraGroup.userData.aura.material.uniforms.uIntensity.value = intensity;
      }

      // 지지직 번개 페이드아웃
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.userData.life -= dt / s.userData.maxLife;
        s.material.opacity = Math.max(0, s.userData.life);
        if (s.userData.life <= 0) {
          anchor.group.remove(s);
          s.geometry.dispose();
          s.material.dispose();
          sparks.splice(i, 1);
        }
      }

      renderer.render(scene, camera);
    });

  } catch (err) {
    console.error(err);
    log(`ERROR: ${err.message}`, 'err');
    let msg = err.message || String(err);
    if (msg.includes('Permission')) msg = '카메라 권한 거부됨';
    else if (location.protocol === 'file:') msg = 'https/localhost로 띄워주세요';
    showError('AR INIT FAILED', msg);
  }
}

// =========================================
// 🥊 THUNDER PUNCH (단순화: GLB 애니 + 지지직 번개만)
// =========================================
let isAttacking = false;
let punchClickCount = 0;

function triggerPunch() {
  if (isAttacking) return;
  isAttacking = true;
  punchClickCount++;

  log(`🥊 PUNCH #${punchClickCount}`);

  // 진동
  if (navigator.vibrate) navigator.vibrate([50, 30, 100]);

  // ===== GLB 애니메이션 재생 =====
  if (punchAction && mixer) {
    // 강제로 처음부터 재생
    punchAction.stop();
    punchAction.reset();
    punchAction.enabled = true;
    punchAction.paused = false;
    punchAction.weight = 1.0;
    punchAction.timeScale = 1.0;
    punchAction.time = 0;
    punchAction.play();

    log(`  action.isRunning=${punchAction.isRunning()}`);
    log(`  action.weight=${punchAction.weight}`);
    log(`  action.time=${punchAction.time.toFixed(2)}`);

    // 0.1초 후 다시 체크 (실제로 진행되는지)
    setTimeout(() => {
      log(`  +0.1s: time=${punchAction.time.toFixed(2)} running=${punchAction.isRunning()}`);
    }, 100);
  } else {
    log('⚠️ punchAction이 없음', 'err');
  }

  // ===== 얇은 지지직 번개 (sparks) =====
  // 펀치 동안 0~1.5초 사이에 무작위로 짧은 스파크들 발생
  const arGroup = pikachuRoot.parent;
  const sparkInterval = setInterval(() => {
    // 피카츄 주변 랜덤 위치에서 짧은 번개
    for (let i = 0; i < 3; i++) {
      const angle = Math.random() * Math.PI * 2;
      const r1 = 0.2 + Math.random() * 0.2;
      const r2 = r1 + 0.15 + Math.random() * 0.15;
      const z1 = 0.2 + Math.random() * 0.6;
      const z2 = z1 + (Math.random() - 0.5) * 0.3;

      const start = new THREE.Vector3(Math.cos(angle) * r1, Math.sin(angle) * r1, z1);
      const end = new THREE.Vector3(Math.cos(angle) * r2, Math.sin(angle) * r2, z2);

      const spark = createSpark(start, end);
      arGroup.add(spark);
      sparks.push(spark);
    }
  }, 80);

  // 1.5초 후 종료
  setTimeout(() => {
    clearInterval(sparkInterval);
    isAttacking = false;
    log(`  PUNCH 완료`);
  }, 1500);
}

async function stopAR() {
  if (mindarThree) {
    try {
      await mindarThree.stop();
      mindarThree.renderer.setAnimationLoop(null);
    } catch (e) {}
    mindarThree = null;
  }
  arUI.classList.remove('active');
  scanHint.classList.remove('active');
  attackBtn.classList.remove('active');
  startScreen.classList.remove('hidden');
}

startBtn.addEventListener('click', () => {
  if (startBtn.disabled) return;
  startScreen.classList.add('hidden');
  setTimeout(startAR, 500);
});
stopBtn.addEventListener('click', stopAR);
